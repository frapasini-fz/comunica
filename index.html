<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ComUnica</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='b' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%2360a5fa'/><stop offset='1' stop-color='%231e3a8a'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23b)'/><path d='M46 22 Q40 16 32 16 Q18 16 18 32 Q18 48 32 48 Q40 48 46 42' stroke='white' stroke-width='5' stroke-linecap='round' fill='none'/></svg>">
<style>
  :root {
    --text: #1f2937;
    --text-strong: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --accent: #2563eb;
    --bg-soft: #f9fafb;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body {
    font-family: var(--sans);
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 2.5rem;
    color: var(--text);
    line-height: 1.6;
  }
  h1 {
    border-bottom: 2px solid var(--border);
    padding-bottom: 0.5rem;
    margin-bottom: 0.25rem;
  }
  .lede {
    color: var(--muted);
    margin: 0.25rem 0 2rem 0;
  }
  .cards {
    display: grid;
    gap: 1.25rem;
  }
  .card {
    display: block;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 1.5rem 1.75rem;
    text-decoration: none;
    color: inherit;
    background: var(--bg-soft);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(37, 99, 235, 0.12);
  }
  .card h2 {
    margin: 0 0 0.4rem 0;
    color: var(--accent);
    font-size: 1.2rem;
  }
  .card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }
</style>
</head>
<body>

<h1>ComUnica</h1>
<p class="lede">Documentazione della Comunicazione Unica di Impresa — scegli la versione da consultare.</p>

<div class="cards">
  <a class="card" href="impresa-individuale-mvp.html">
    <h2>Impresa individuale — MVP</h2>
  </a>
  <a class="card" href="impresa-individuale-non-agricola.html">
    <h2>Impresa individuale non agricola</h2>
  </a>
</div>

</body>
</html>
